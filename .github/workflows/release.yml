name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package versions
        run: pnpm -r exec npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Publish @chativa/core
        run: npm publish --access public --provenance
        working-directory: packages/core

      - name: Publish @chativa/connector-dummy
        run: npm publish --access public --provenance
        working-directory: packages/connector-dummy

      - name: Publish @chativa/connector-websocket
        run: npm publish --access public --provenance
        working-directory: packages/connector-websocket

      - name: Publish @chativa/connector-signalr
        run: npm publish --access public --provenance
        working-directory: packages/connector-signalr

      - name: Publish @chativa/connector-directline
        run: npm publish --access public --provenance
        working-directory: packages/connector-directline

      - name: Publish @chativa/ui
        run: npm publish --access public --provenance
        working-directory: packages/ui

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
