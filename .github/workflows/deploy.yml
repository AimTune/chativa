name: Deploy site (docs + sandbox) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel in-progress if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (core, ui, genui, connectors)
        run: pnpm build

      - name: Build sandbox at /sandbox
        run: pnpm --filter sandbox build
        env:
          VITE_BASE: /sandbox/

      - name: Build Docusaurus site
        run: pnpm --filter website build

      - name: Combine sandbox + schemas into docs build
        run: |
          mkdir -p website/build/sandbox
          cp -R apps/sandbox/dist/. website/build/sandbox/
          # Publish JSON schemas at /schemas/* so the $id URLs resolve.
          mkdir -p website/build/schemas
          cp -R schemas/. website/build/schemas/
          # Ensure GitHub Pages does not strip the _next-style underscore-prefixed directories.
          touch website/build/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
